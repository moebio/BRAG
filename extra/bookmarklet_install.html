<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAG Bookmarklet Installation</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #121212;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: rgba(40, 40, 40, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 500px;
        }

        h1 {
            margin-top: 0;
            color: #fff;
        }

        p {
            line-height: 1.6;
            color: #ccc;
        }

        .bookmark-link {
            display: inline-block;
            background: #e06a6a;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 20px 0;
            transition: transform 0.2s, background 0.2s;
            cursor: move;
        }

        .bookmark-link:hover {
            background: #ff7a7a;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Install BRAG</h1>
        <p>Drag the button below to your <b>Bookmarks Bar</b>.</p>

        <a class="bookmark-link"
            href="javascript:void((function(){var b='http://127.0.0.1:8080/BRAG/index.html';var u=encodeURIComponent(window.location.href);var t=encodeURIComponent(document.title);window.open(b+'#url='+u+'&title='+t,'BRAG_PRIMARY_STATION');})())">
            BRAG
        </a>

        <p style="font-size: 0.8rem; color: #666; margin-top: 30px;">
            This bookmarklet opens BRAG at:<br>
            <b>http://127.0.0.1:8080/BRAG/</b>
        </p>
    </div>
</body>

</html>
